<svg width="440" height="260" viewBox="0 0 440 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Animated killer whale (orca)">
  <defs>
    <!-- Glossy wet black: cool blue-charcoal, lighter toward the flank (top-lit) -->
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#2a323b"/>
      <stop offset="0.42" stop-color="#151b22"/>
      <stop offset="1"    stop-color="#0a0f14"/>
    </linearGradient>

    <!-- Fin gradient (a touch flatter, top-lit) -->
    <linearGradient id="finGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#232a32"/>
      <stop offset="1"   stop-color="#0b1016"/>
    </linearGradient>

    <!-- Belly: soft off-white with a faint cool shadow underneath -->
    <linearGradient id="bellyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#ffffff"/>
      <stop offset="0.7"  stop-color="#eef2f3"/>
      <stop offset="1"    stop-color="#d4dde0"/>
    </linearGradient>

    <!-- Subtle specular sheen along the back -->
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#dff2fb" stop-opacity="0.26"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="1"    stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Tight specular highlight for the wet melon -->
    <radialGradient id="specular" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0"   stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="0.6" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="1"   stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <filter id="softShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="2" flood-color="#001019" flood-opacity="0.13"/>
    </filter>

    <filter id="blurSm" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.6"/>
    </filter>

    <!-- Optional subtle water wobble -->
    <filter id="waterWobble" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="2" seed="2" result="noise">
        <animate attributeName="baseFrequency" dur="6s" values="0.012;0.018;0.012" repeatCount="indefinite"/>
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <style>
    .swim   { animation: swim 4.6s ease-in-out infinite; transform-origin:50% 50%; transform-box:fill-box; filter:url(#softShadow); }
    .tail   { animation: tail 1.5s ease-in-out infinite; transform-origin:left center; transform-box:fill-box; }
    .fluke  { animation: fluke 1.5s ease-in-out infinite; transform-origin:left center; transform-box:fill-box; }
    .dorsal { animation: fin 3.6s ease-in-out infinite; transform-origin:50% 100%; transform-box:fill-box; }
    .pectoral { animation: fin2 2.9s ease-in-out infinite; transform-origin:18% 12%; transform-box:fill-box; }
    .blink  { transform-origin:center; transform-box:fill-box; animation: blink 6s infinite; }

    @media (prefers-reduced-motion: reduce) {
      .swim,.tail,.fluke,.dorsal,.pectoral,.blink { animation:none !important; }
    }

    @keyframes swim {
      0%   { transform: translate(0,-3px) rotate(-0.8deg); }
      25%  { transform: translate(5px,1px) rotate(0.5deg); }
      50%  { transform: translate(0,3px)  rotate(1deg); }
      75%  { transform: translate(-5px,1px) rotate(0.3deg); }
      100% { transform: translate(0,-3px) rotate(-0.8deg); }
    }
    @keyframes tail  { 0%{transform:rotate(-6deg);} 50%{transform:rotate(8deg);} 100%{transform:rotate(-6deg);} }
    @keyframes fluke { 0%{transform:rotate(7deg);} 50%{transform:rotate(-9deg);} 100%{transform:rotate(7deg);} }
    @keyframes fin   { 0%{transform:rotate(-1.5deg);} 50%{transform:rotate(1.5deg);} 100%{transform:rotate(-1.5deg);} }
    @keyframes fin2  { 0%{transform:rotate(4deg);} 50%{transform:rotate(-5deg);} 100%{transform:rotate(4deg);} }
    @keyframes blink { 0%,93%,100%{transform:scaleY(1);} 95%{transform:scaleY(0.1);} 97%{transform:scaleY(1);} }
  </style>

  <g class="swim">

    <!-- ===== PECTORAL FLIPPER (broad rounded paddle, low & back) ===== -->
    <g class="pectoral">
      <path fill="url(#finGrad)"
        d="M150,166
           C174,169 200,181 216,196
           C224,203 223,214 213,215
           C204,216 193,214 183,208
           C167,199 144,183 139,171
           C136,165 143,162 150,166 Z"/>
    </g>

    <!-- ===== TAIL (peduncle + horizontal flukes) ===== -->
    <g class="tail">
      <g class="fluke">
        <!-- Flukes: one broad, horizontal, back-swept paddle with a shallow median notch -->
        <path fill="url(#finGrad)"
          d="M312,150
             C338,141 372,136 402,138
             C422,139 434,144 434,150
             C430,154 423,156 417,156
             C421,159 427,164 431,170
             C434,175 429,179 422,177
             C398,170 364,163 332,160
             C322,158 314,155 312,150 Z"/>
        <!-- soft white underside catch on the lower fluke (blurred, no hard edge) -->
        <path fill="url(#bellyGrad)" opacity="0.28" filter="url(#blurSm)"
          d="M338,159 C368,164 400,169 424,177 C398,169 362,162 338,158 Z"/>
      </g>
    </g>

    <!-- ===== BODY ===== -->
    <path fill="url(#bodyGrad)"
      d="M44,146
         C46,123 64,104 94,96
         C144,83 200,85 240,98
         C288,114 318,127 344,141
         C351,145 351,157 344,161
         C318,173 282,186 234,192
         C186,198 146,196 108,183
         C72,171 50,161 44,146 Z"/>

    <!-- Countershading / belly: full band under chest & midbody, tapering before the tail -->
    <path fill="url(#bellyGrad)"
      d="M54,150
         C118,150 178,153 218,158
         C258,164 288,170 310,171
         C296,178 268,186 234,190
         C188,196 148,194 110,182
         C82,173 62,163 54,150 Z"/>

    <!-- soft shadow where the white wraps under the belly -->
    <path fill="#0a0f14" opacity="0.18" filter="url(#blurSm)"
      d="M60,150 C120,150 180,153 220,158 C258,164 288,170 310,171 C286,167 250,161 210,158 C168,155 116,153 60,152 Z"/>

    <!-- Saddle patch (grey, on the flank just behind & below the dorsal fin) -->
    <path fill="#828990" opacity="0.55" filter="url(#blurSm)"
      d="M246,110 C274,114 296,121 312,131 C298,130 274,127 250,125 C246,120 245,114 246,110 Z"/>

    <!-- Eye patch: off-white almond, tilted up-and-back, just above/behind the eye -->
    <path fill="#eef1f1"
      d="M106,128
         C104,120 114,113 127,112
         C140,111 151,114 148,118
         C143,123 131,125 121,126
         C115,127 109,128 106,128 Z"/>

    <!-- Eye (at the antero-ventral corner of the patch) -->
    <g class="blink">
      <ellipse cx="99" cy="132" rx="5" ry="4.3" fill="#06080b"/>
      <circle cx="97.4" cy="130.4" r="1.4" fill="#ffffff" opacity="0.85"/>
    </g>

    <!-- Blowhole on top of the head -->
    <path d="M116,95 C120,93 124,94 125,97" fill="none" stroke="#000" stroke-width="1.4" opacity="0.4" stroke-linecap="round"/>

    <!-- Mouth / gape line (very soft) -->
    <path d="M52,150 C76,155 106,156 132,153" fill="none" stroke="#05060a" stroke-width="1.4" opacity="0.22" stroke-linecap="round"/>

    <!-- Glossy back sheen (narrow streak following the spine) -->
    <path fill="url(#sheen)"
      d="M84,106 C122,94 166,94 202,102 C168,99 126,102 96,113 C90,111 86,109 84,106 Z"/>

    <!-- Wet specular highlight on the melon -->
    <ellipse cx="118" cy="110" rx="30" ry="10" fill="url(#specular)" transform="rotate(-13 118 110)"/>

    <!-- Soft rim light along the head & upper back -->
    <path d="M58,124 C70,106 92,97 122,93 C168,86 210,89 244,100"
      fill="none" stroke="#bfe6f5" stroke-opacity="0.22" stroke-width="2.4"
      stroke-linecap="round" filter="url(#blurSm)"/>

    <!-- ===== DORSAL FIN (tall, upright male-orca profile, gently falcate) ===== -->
    <g class="dorsal">
      <path fill="url(#finGrad)"
        d="M188,101
           C194,72 206,44 216,32
           C219,29 223,31 223,37
           C222,58 226,80 246,98
           C228,101 206,102 188,101 Z"/>
    </g>

  </g>
</svg>
