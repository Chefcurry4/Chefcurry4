<svg width="440" height="280" viewBox="0 0 440 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A basketball arcing into the hoop for a swish">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#243247"/><stop offset="0.55" stop-color="#1b2740"/><stop offset="0.78" stop-color="#141d33"/>
    </linearGradient>
    <radialGradient id="spot" cx="0.5" cy="0.42" r="0.55">
      <stop offset="0" stop-color="#f4ecd8" stop-opacity="0.26"/><stop offset="0.6" stop-color="#cdd7e6" stop-opacity="0.05"/><stop offset="1" stop-color="#cdd7e6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c98a49"/><stop offset="0.35" stop-color="#a96f37"/><stop offset="1" stop-color="#6f4522"/>
    </linearGradient>
    <radialGradient id="ball" cx="0.36" cy="0.32" r="0.75">
      <stop offset="0" stop-color="#ffc47a"/><stop offset="0.42" stop-color="#f8862f"/><stop offset="0.82" stop-color="#dd5c14"/><stop offset="1" stop-color="#a83e0c"/>
    </radialGradient>
    <radialGradient id="ballShade" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0.6" stop-color="#000" stop-opacity="0"/><stop offset="1" stop-color="#5a1e04" stop-opacity="0.5"/>
    </radialGradient>
    <linearGradient id="board" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f3f6fb"/><stop offset="1" stop-color="#d3dbe6"/>
    </linearGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff8a3d"/><stop offset="0.5" stop-color="#f4681c"/><stop offset="1" stop-color="#d1550f"/>
    </linearGradient>
    <linearGradient id="pole" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3a4252"/><stop offset="0.5" stop-color="#59637a"/><stop offset="1" stop-color="#2c3342"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.2" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="blur3"><feGaussianBlur stdDeviation="3"/></filter>
    <clipPath id="ballClip"><circle cx="0" cy="0" r="18"/></clipPath>
  </defs>

  <style>
    .ball { offset-path: path('M84,180 C150,50 250,40 330,66 C356,76 361,96 361,120 C361,132 361,142 361,152'); offset-rotate: 0deg; animation: arc 3s cubic-bezier(.45,0,.7,1) infinite; }
    .spin { transform-box: fill-box; transform-origin: center; animation: spin .8s linear infinite; }
    .shadow { offset-path: path('M84,250 C150,250 300,250 361,250'); offset-rotate: 0deg; animation: arcshadow 3s cubic-bezier(.45,0,.7,1) infinite; }
    .net { transform-box: fill-box; transform-origin: top center; animation: swish 3s ease-in-out infinite; }
    .trail { animation: trail 3s ease-in-out infinite; }

    @keyframes arc {
      0% { offset-distance:0%; opacity:0; } 6% { opacity:1; }
      80% { offset-distance:100%; opacity:1; } 87% { offset-distance:100%; opacity:0; }
      100% { offset-distance:0%; opacity:0; }
    }
    @keyframes arcshadow {
      0% { offset-distance:0%; opacity:.3; } 45% { opacity:.11; }
      80% { offset-distance:100%; opacity:.28; } 100% { offset-distance:100%; opacity:.28; }
    }
    @keyframes spin { to { transform: rotate(-360deg); } }
    @keyframes swish {
      0%,72% { transform: scaleY(1) translateY(0); }
      83% { transform: scaleY(1.16) translateY(4px); }
      92% { transform: scaleY(.98) translateY(0); } 100% { transform: scaleY(1) translateY(0); }
    }
    @keyframes trail { 0%,50%{opacity:0} 66%{opacity:.5} 82%,100%{opacity:0} }

    @media (prefers-reduced-motion: reduce) {
      .ball,.spin,.shadow,.net,.trail { animation:none !important; }
      .ball { offset-distance:39% !important; } .shadow { offset-distance:39% !important; opacity:.16 !important; }
      .trail { opacity:0 !important; }
    }
  </style>

  <rect width="440" height="280" rx="22" fill="url(#sky)"/>
  <ellipse cx="353" cy="118" rx="185" ry="122" fill="url(#spot)"/>

  <!-- floor -->
  <rect x="0" y="222" width="440" height="58" fill="url(#floor)"/>
  <rect x="0" y="222" width="440" height="9" fill="#1a1005" opacity="0.3"/>
  <path d="M118,278 L210,231 H324 L396,278" fill="#c96f2f" opacity="0.15"/>
  <path d="M118,278 L210,231 H324 L396,278" fill="none" stroke="#f0e0bc" stroke-width="1.6" opacity="0.3"/>
  <g stroke="#4f3216" stroke-width="1" opacity="0.26">
    <path d="M0,241 H440"/><path d="M0,259 H440"/><path d="M0,275 H440"/>
    <path d="M70,231 V278" opacity="0.6"/><path d="M300,231 V278" opacity="0.6"/><path d="M440,231 V278" opacity="0.6"/>
  </g>
  <path d="M0,222 H440" stroke="#f2e6c6" stroke-width="1.4" opacity="0.4"/>

  <!-- stanchion pole + support arm behind board -->
  <rect x="356" y="126" width="10" height="96" rx="3" fill="url(#pole)"/>
  <path d="M420,70 q36,-3 46,-20" fill="none" stroke="#2b3242" stroke-width="7" stroke-linecap="round"/>

  <!-- backboard -->
  <g filter="url(#soft)">
    <rect x="296" y="46" width="130" height="80" rx="5" fill="url(#board)"/>
    <rect x="297.5" y="47.5" width="127" height="77" rx="4" fill="none" stroke="#aab6c6" stroke-width="1.4"/>
    <rect x="339" y="86" width="44" height="30" rx="2" fill="none" stroke="#e8620f" stroke-width="3"/>
  </g>

  <!-- rim back edge (dim, thin) + mount -->
  <path d="M332,126 A29,9.5 0 0 1 390,126" fill="none" stroke="#b0480f" stroke-width="4" opacity="0.85"/>
  <rect x="357" y="120" width="8" height="7" rx="2" fill="#c9500e"/>

  <!-- net: back strands, rings, front strands -->
  <g class="net" fill="none" stroke-linecap="round">
    <g stroke="#c3cbd8" stroke-width="1" opacity="0.42">
      <path d="M335.9,121.2 Q348.4,151.8 361.0,177.2"/>
      <path d="M335.9,121.2 Q343.2,155.4 350.6,184.4"/>
      <path d="M346.5,117.8 Q356.8,150.4 367.0,177.9"/>
      <path d="M346.5,117.8 Q347.8,152.5 349.0,182.0"/>
      <path d="M361.0,116.5 Q366.2,150.7 371.4,179.6"/>
      <path d="M361.0,116.5 Q355.8,150.7 350.6,179.6"/>
      <path d="M375.5,117.8 Q374.2,152.5 373.0,182.0"/>
      <path d="M375.5,117.8 Q365.2,150.4 355.0,177.9"/>
      <path d="M386.1,121.2 Q378.8,155.4 371.4,184.4"/>
      <path d="M386.1,121.2 Q373.6,151.8 361.0,177.2"/>
    </g>
    <g stroke="#d4dbe6" stroke-width="0.9" opacity="0.5">
      <ellipse cx="361" cy="148.4" rx="22.2" ry="7.6"/>
      <ellipse cx="361" cy="166.3" rx="16.8" ry="6.1"/>
    </g>
    <g stroke="#f2f5fa" stroke-width="1.35" opacity="0.92">
      <path d="M390.0,126.0 Q378.5,158.7 367.0,186.1"/>
      <path d="M390.0,126.0 Q378.5,154.5 367.0,177.9"/>
      <path d="M386.1,130.8 Q373.6,161.3 361.0,186.8"/>
      <path d="M386.1,130.8 Q378.8,157.8 371.4,179.6"/>
      <path d="M375.5,134.2 Q365.2,162.8 355.0,186.1"/>
      <path d="M375.5,134.2 Q374.2,160.7 373.0,182.0"/>
      <path d="M361.0,135.5 Q355.8,162.5 350.6,184.4"/>
      <path d="M361.0,135.5 Q366.2,162.5 371.4,184.4"/>
      <path d="M346.5,134.2 Q347.8,160.7 349.0,182.0"/>
      <path d="M346.5,134.2 Q356.8,162.8 367.0,186.1"/>
      <path d="M335.9,130.8 Q343.2,157.8 350.6,179.6"/>
      <path d="M335.9,130.8 Q348.4,161.3 361.0,186.8"/>
      <path d="M332.0,126.0 Q343.5,154.5 355.0,177.9"/>
      <path d="M332.0,126.0 Q343.5,158.7 355.0,186.1"/>
    </g>
  </g>

  <!-- flight trail -->
  <path class="trail" d="M84,180 C150,50 250,40 330,66 C356,76 361,96 361,120 C361,132 361,142 361,152" fill="none" stroke="#ffd9a8" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="1 10" opacity="0"/>

  <!-- moving contact shadow -->
  <ellipse class="shadow" cx="0" cy="0" rx="16" ry="3.6" fill="#000" opacity="0.3" filter="url(#blur3)"/>

  <!-- ball (behind the front rim so the drop occludes correctly) -->
  <g class="ball">
    <g class="spin">
      <circle cx="0" cy="0" r="18" fill="url(#ball)"/>
      <g clip-path="url(#ballClip)" stroke="#5a2a10" stroke-width="2" stroke-linecap="round" fill="none">
        <path d="M0,-18 L0,18"/>
        <path d="M-17,-1 Q0,3 17,-1"/>
        <path d="M0,-18 C-14.8,-9.9 -14.8,9.9 0,18"/>
        <path d="M0,-18 C14.8,-9.9 14.8,9.9 0,18"/>
      </g>
      <circle cx="0" cy="0" r="18" fill="url(#ballShade)"/>
      <ellipse cx="-6.5" cy="-7.5" rx="4.2" ry="2.6" fill="#fff" opacity="0.32" transform="rotate(-30 -6.5 -7.5)"/>
    </g>
  </g>

  <!-- rim front edge (bright, thick) - in front of net and ball -->
  <path d="M332,126 A29,9.5 0 0 0 390,126" fill="none" stroke="url(#rim)" stroke-width="5" stroke-linecap="round"/>
</svg>
