<svg width="360" height="220" viewBox="0 0 360 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="courtBg" x1="0" y1="0" x2="360" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A1020"/>
      <stop offset="1" stop-color="#1A0F2E"/>
    </linearGradient>

    <linearGradient id="hoopGlow" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>

    <linearGradient id="ballFill" x1="64" y1="156" x2="96" y2="188" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FB923C"/>
      <stop offset="1" stop-color="#EA580C"/>
    </linearGradient>

    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="360" height="220" rx="24" fill="url(#courtBg)"/>

  <!-- Futuristic grid -->
  <g opacity="0.18">
    <path d="M24 184H336" stroke="#38BDF8"/>
    <path d="M40 200H320" stroke="#8B5CF6"/>
    <path d="M74 56V196" stroke="#38BDF8"/>
    <path d="M126 44V196" stroke="#38BDF8"/>
    <path d="M178 36V196" stroke="#38BDF8"/>
    <path d="M230 44V196" stroke="#38BDF8"/>
    <path d="M282 56V196" stroke="#38BDF8"/>
  </g>

  <!-- Backboard -->
  <g filter="url(#glow)">
    <rect x="250" y="54" width="10" height="88" rx="4" fill="#94A3B8"/>
    <rect x="228" y="56" width="60" height="40" rx="6" stroke="#E2E8F0" stroke-width="3" fill="rgba(255,255,255,0.02)"/>
    <rect x="244" y="66" width="18" height="12" rx="2" stroke="#22D3EE" stroke-width="2"/>
  </g>

  <!-- Rim -->
  <g filter="url(#glow)">
    <ellipse cx="244" cy="98" rx="22" ry="6" fill="none" stroke="#F97316" stroke-width="4"/>
  </g>

  <!-- Net -->
  <g opacity="0.9">
    <path d="M224 99L230 124M232 100L236 126M240 100L242 127M248 100L248 127M256 100L254 126M264 99L260 124" stroke="#E2E8F0" stroke-width="1.7" stroke-linecap="round">
      <animate attributeName="d"
        values="
        M224 99L230 124M232 100L236 126M240 100L242 127M248 100L248 127M256 100L254 126M264 99L260 124;
        M224 99L232 128M232 100L238 130M240 100L244 132M248 100L248 132M256 100L252 130M264 99L256 128;
        M224 99L230 124M232 100L236 126M240 100L242 127M248 100L248 127M256 100L254 126M264 99L260 124"
        dur="2.8s"
        repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Trajectory -->
  <path d="M80 170C130 110 172 70 222 96" stroke="#22D3EE" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="7 8" opacity="0.75">
    <animate attributeName="stroke-dashoffset" values="0;-60" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.25;0.85;0.25" dur="2.4s" repeatCount="indefinite"/>
  </path>

  <!-- Ball -->
  <g>
    <circle r="16" fill="url(#ballFill)" stroke="#FDBA74" stroke-width="2" filter="url(#glow)">
      <animateMotion dur="2.8s" repeatCount="indefinite" rotate="auto">
        <mpath href="#ballPath"/>
      </animateMotion>
    </circle>

    <path d="M0 -16C0 -5 0 5 0 16M-16 0C-5 0 5 0 16 0M-11 -11C-3 -5 3 5 11 11M11 -11C3 -5 -3 5 -11 11"
      stroke="#7C2D12" stroke-width="2.2" stroke-linecap="round">
      <animateMotion dur="2.8s" repeatCount="indefinite" rotate="auto">
        <mpath href="#ballPath"/>
      </animateMotion>
    </path>
  </g>

  <path id="ballPath" d="M80 170C130 110 172 70 222 96C234 102 240 104 244 102C248 100 252 96 256 92" fill="none"/>

  <!-- Swish pulse -->
  <circle cx="244" cy="98" r="10" stroke="#F8FAFC" stroke-width="2" opacity="0">
    <animate attributeName="r" values="10;26;36" dur="2.8s" repeatCount="indefinite" begin="1.8s"/>
    <animate attributeName="opacity" values="0;0.9;0" dur="2.8s" repeatCount="indefinite" begin="1.8s"/>
  </circle>
</svg>
